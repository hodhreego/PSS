<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSS SEED-PR 2027 — Assessoria Prova Prática</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B3A6B;
    --navy-deep:#0F2547;
    --gold:#C9A227;
    --gold-light:#E9D48E;
    --bg:#EEF3FB;
    --ink:#1B2733;
    --line:#C7D3E3;
    --white:#FFFFFF;
    --alert:#B23A3A;
    --alert-bg:#FBEAEA;
    --green:#34D399;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:#3B4552;
    font-family:'Source Sans 3', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    background:var(--bg);
  }
  .stage{display:flex; flex-direction:column; align-items:center; gap:14px;}

  /* Canvas: proporção iPhone 12 (390 x 844), sem moldura de celular, cantos retos */
  .canvas{
    width:390px;
    height:844px;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* ---------- CABEÇALHO FIXO ---------- */
  .hero{
    flex:0 0 auto;
    background:linear-gradient(160deg, var(--navy-deep) 0%, var(--navy) 62%, #274A82 100%);
    color:var(--white);
    padding:24px 22px 16px;
    position:relative;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute; right:-60px; top:-60px; width:200px; height:200px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(201,162,39,.28) 0%, rgba(201,162,39,0) 70%);
  }
  .celebrate-flash{
    position:absolute; top:6px; left:50%; z-index:6;
    font-size:84px; opacity:0; transform:translateX(-50%) scale(0);
    pointer-events:none;
  }
  .celebrate-flash.pop{ animation: celebratePop 1s ease-out; }
  @keyframes celebratePop{
    0%{transform:translateX(-50%) scale(0); opacity:0;}
    28%{transform:translateX(-50%) scale(1.35); opacity:1;}
    55%{transform:translateX(-50%) scale(1); opacity:1;}
    100%{transform:translateX(-50%) scale(.8) translateY(-6px); opacity:0;}
  }
  .eyebrow{
    display:inline-flex; align-items:center; gap:6px;
    font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; font-weight:700;
    color:var(--gold-light);
    border:1px solid rgba(233,212,142,.45);
    padding:4px 9px; border-radius:20px;
    background:rgba(255,255,255,.04);
  }
  .eyebrow span.dot{
    width:10px; height:10px; border-radius:50%; background:var(--gold); flex-shrink:0;
    animation:dotBlink 1.2s ease-in-out infinite;
  }
  @keyframes dotBlink{0%,100%{background:var(--gold);} 50%{background:var(--green);}}

  .store-badge{
    position:absolute; top:14px; right:14px; z-index:3;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    background:rgba(255,255,255,.08); border:1px solid rgba(233,212,142,.4);
    border-radius:13px; padding:10px 15px;
  }
  .store-badge .temple{
    font-size:36px; line-height:1; display:inline-block;
    animation:templeWobble 2.4s ease-in-out infinite;
  }
  @keyframes templeWobble{0%,100%{transform:rotate(-45deg);} 50%{transform:rotate(45deg);}}
  .store-badge .store-text{
    font-size:9.5px; font-weight:800; color:var(--gold-light); text-align:center;
    line-height:1.2; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap;
  }

  h1{
    font-family:'Playfair Display', serif; font-weight:700; font-size:18.5px; line-height:1.2;
    margin-top:10px; letter-spacing:.2px;
  }
  h1 em{font-style:italic; color:var(--gold-light);}

  .drive-link{
    display:flex; align-items:center; gap:8px;
    margin-top:10px; width:fit-content;
    background:rgba(255,255,255,.1); border:1.5px solid var(--gold-light);
    border-radius:12px; padding:9px 15px;
    font-weight:800;
    text-decoration:none; letter-spacing:.01em;
  }
  .drive-text{
    font-size:21.75px;
    animation: driveBlink 1.2s ease-in-out infinite;
  }
  @keyframes driveBlink{0%,100%{color:var(--alert);} 50%{color:var(--green);}}
  .drive-emoji{
    font-size:38px; line-height:1; display:inline-block;
    animation: driveHeartbeat 0.9s ease-in-out infinite;
  }
  @keyframes driveHeartbeat{0%,100%{transform:scale(1);} 50%{transform:scale(1.25);}}

  .meters{display:flex; flex-direction:column; gap:8px; margin-top:12px;}
  .meter{background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14); border-radius:12px; padding:10px 12px 11px;}
  .meter-name{font-size:9px; font-weight:800; color:var(--gold-light); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px;}
  .meter-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
  .meter-top .big{font-family:'Playfair Display', serif; font-size:19px; font-weight:700; color:var(--gold-light); transition:color .2s;}
  .meter-top .unit{font-size:12px;}
  .meter-top .happy{font-size:14px;}
  .meter-top .small{font-size:9px; color:#C7D3E3; text-transform:uppercase; letter-spacing:.06em;}
  .bar{width:100%; height:8px; border-radius:6px; overflow:hidden; background:rgba(255,255,255,.12);}
  .bar-fill{height:100%; width:0%; border-radius:6px; background:linear-gradient(90deg, var(--gold), var(--gold-light)); transition:width .45s cubic-bezier(.34,1.4,.64,1);}
  .meters-legend{font-size:8.5px; color:#C7D3E3; text-align:center; margin-top:2px; letter-spacing:.02em;}

  .live-total{margin-top:9px; display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,.08); border:1px dashed rgba(233,212,142,.5); border-radius:10px; padding:7px 11px;}
  .live-total .lt-label{font-size:9.5px; color:#D8E2F2;}
  .live-total .lt-value{font-family:'Playfair Display', serif; font-size:18px; font-weight:800; color:var(--gold-light);}

  /* ---------- CORPO ROLÁVEL ---------- */
  .scroll{flex:1 1 auto; min-height:0; overflow-y:auto; overflow-x:hidden; padding:16px 20px 8px; scrollbar-width:none;}
  .scroll::-webkit-scrollbar{display:none;}

  .section-title{font-family:'Playfair Display', serif; font-size:14px; font-weight:700; color:var(--navy); margin-bottom:3px;}
  .section-sub{font-size:10.5px; color:#5A6B85; margin-bottom:10px;}

  .card{background:var(--white); border:1px solid var(--line); border-radius:14px; padding:13px 14px; margin-bottom:10px;}
  .card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;}
  .card-head h3{font-family:'Playfair Display', serif; font-size:13.5px; color:var(--navy); font-weight:700;}
  .pts{font-size:9px; font-weight:700; color:var(--navy); background:var(--bg); border:1px solid var(--line); padding:3px 8px; border-radius:20px; white-space:nowrap;}
  .card ul{list-style:none; display:flex; flex-direction:column; gap:5px;}
  .card li{font-size:11px; line-height:1.4; color:var(--ink); padding-left:15px; position:relative;}
  .card li::before{content:""; position:absolute; left:0; top:6px; width:5px; height:5px; border-radius:50%; background:var(--gold);}

  /* ---------- ACORDEÃO DE RUBRICAS ---------- */
  details.rubric{background:var(--white); border:1px solid var(--line); border-radius:14px; margin-bottom:12px; overflow:hidden;}
  details.rubric summary{
    list-style:none; cursor:pointer; padding:12px 14px; display:flex; align-items:center; gap:8px;
    font-family:'Playfair Display', serif; font-weight:700; font-size:12.5px; color:var(--navy);
  }
  details.rubric summary::-webkit-details-marker{display:none;}
  summary .summary-text{flex:1;}
  summary .tap-hint{font-size:15px; flex-shrink:0; animation:swipeMove 1.3s ease-in-out infinite;}
  summary .chev-btn{
    width:24px; height:24px; border-radius:50%; background:var(--bg); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  summary .chev{font-size:13px; font-weight:700; color:var(--navy); transition:transform .2s ease; font-family:'Source Sans 3', sans-serif;}
  details.rubric[open] summary .chev-btn .chev{transform:rotate(180deg);}
  .rubric-body{padding:0 14px 14px;}
  .rubric-alert{
    font-size:10px; line-height:1.4; color:var(--alert); background:var(--alert-bg);
    border:1px solid #E7BEBE; border-radius:8px; padding:8px 10px; margin-bottom:10px; font-weight:600;
  }
  .rubric-group{margin-bottom:10px;}
  .rubric-group-title{display:flex; justify-content:space-between; align-items:baseline; font-size:10.5px; font-weight:700; color:var(--navy); margin-bottom:4px;}
  .rubric-group-title span{font-size:9px; color:var(--gold); font-weight:700;}
  table.rtable{width:100%; border-collapse:collapse;}
  table.rtable td{font-size:9px; padding:4px 6px; border:1px solid var(--line); color:var(--ink);}
  table.rtable td:last-child{text-align:right; font-weight:700; color:var(--navy); white-space:nowrap; width:36px;}

  /* ---------- MINIATURAS A4 (modelo real, preto e branco) ---------- */
  .swipe-hint{display:flex; align-items:center; gap:5px; font-size:9.5px; color:#7285A0; font-weight:600; margin-bottom:8px;}
  .swipe-hint .hand{display:inline-block; font-size:13px; animation:swipeMove 1.5s ease-in-out infinite;}
  @keyframes swipeMove{0%,100%{transform:translateX(0);} 50%{transform:translateX(6px);}}
  .previews{margin:14px 0 6px;}
  .previews-strip{display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; scroll-snap-type:x proximity;}
  .previews-strip::-webkit-scrollbar{display:none;}
  .mini-wrap{flex:0 0 auto; scroll-snap-align:start; width:152px;}
  .a4-mini{
    width:152px; height:215px; background:#FFFFFF; border:1px solid #B9B9B9;
    box-shadow:0 3px 8px rgba(0,0,0,.18); padding:6px 7px 5px; display:flex; flex-direction:column; color:#1A1A1A;
    overflow:hidden;
  }
  /* cabeçalho do modelo: ANEXO XV + regra dourada + título navy + subtítulo itálico */
  .a4-mini .anexo{font-size:4.6px; letter-spacing:.05em; text-align:center; font-weight:800; color:var(--navy);}
  .a4-mini .rule-gold{height:0.7px; background:var(--gold); margin:1.5px 0 2.5px;}
  .a4-mini .ttl{font-family:'Playfair Display', serif; font-weight:700; font-size:4.6px; line-height:1.2; text-align:center; color:var(--navy); margin-bottom:1px;}
  .a4-mini .subttl{font-size:3.3px; font-style:italic; text-align:center; color:#555; margin-bottom:3px; line-height:1.2;}
  /* campo com rótulo em negrito + instrução em itálico cinza, como no docx */
  .a4-mini .fld{border:1px solid #9A9A9A; padding:1.5px 2.5px; margin-bottom:1.6px;}
  .a4-mini .lbl{font-size:3.5px; font-weight:700; color:#111; line-height:1.15;}
  .a4-mini .val{font-size:3.1px; font-style:italic; color:#555; margin-top:0.8px; line-height:1.15;}
  /* linha com 2 ou 3 colunas, como as tabelas do modelo */
  .a4-mini .fld-row{display:flex; border:1px solid #9A9A9A; margin-bottom:1.6px;}
  .a4-mini .fld-row .col{flex:1; min-width:0; padding:1.5px 2.5px;}
  .a4-mini .fld-row .col + .col{border-left:1px solid #CFCFCF;}
  /* faixa de seção azul clara, como no modelo real */
  .a4-mini .hd{font-size:3.6px; font-weight:700; color:var(--navy); background:#EAF1FB; padding:1.4px 2.5px; margin:2.5px 0 1.6px;}
  .a4-mini .sig{margin-top:auto; padding-top:2.5px; border-top:0.6px solid #DADADA; text-align:center;}
  .a4-mini .sig .l1{font-size:3px; color:#666;}
  .a4-mini .sig .l2{font-size:2.7px; font-style:italic; color:#999; margin-top:0.6px;}
  .mini-caption{font-size:9px; color:#3D4A5E; font-weight:600; margin-top:6px; text-align:center; line-height:1.3;}

  /* ---------- SELETOR ---------- */
  .selector{background:var(--white); border:1.5px solid var(--navy); border-radius:16px; padding:15px; margin:16px 0 12px;}
  .selector-title{font-family:'Playfair Display', serif; font-size:14px; font-weight:700; color:var(--navy); margin-bottom:2px;}
  .selector-sub{font-size:10px; color:#5A6B85; margin-bottom:10px;}
  .selector-subtitle{font-size:10px; font-weight:700; color:var(--navy); margin:12px 0 6px; text-transform:uppercase; letter-spacing:.03em;}
  .selector-subtitle:first-of-type{margin-top:0;}

  /* cartões de tipo de plano — seleção única, "marcante" */
  .plano-group{display:flex; flex-direction:column; gap:7px;}
  .plano-card{display:flex; align-items:center; gap:9px; padding:10px; border:1.5px solid var(--line); border-radius:11px; cursor:pointer; transition:border-color .2s, background .2s;}
  .plano-card input{width:18px; height:18px; accent-color:var(--navy); flex-shrink:0;}
  .plano-card .emoji{font-size:17px; line-height:1; flex-shrink:0;}
  .plano-card .txt{flex:1;}
  .plano-card .txt .name{font-size:11.5px; font-weight:700; color:var(--ink);}
  .plano-card .txt .desc{font-size:9px; color:#7285A0; margin-top:1px;}
  .plano-card .price{font-size:12px; font-weight:700; color:var(--navy); white-space:nowrap;}
  .plano-card.selected{border-color:var(--navy); background:var(--bg);}
  .plano-card.alert{border-color:var(--alert); background:var(--alert-bg);}

  .opt{display:flex; align-items:flex-start; gap:9px; padding:9px 6px; border-bottom:1px solid var(--bg); border-radius:8px; cursor:pointer; transition:background .2s, border-color .2s;}
  .opt:last-of-type{border-bottom:none;}
  .opt input{width:19px; height:19px; accent-color:var(--navy); flex-shrink:0; margin-top:1px;}
  .opt-emoji{font-size:17px; line-height:1; flex-shrink:0; margin-top:1px;}
  .opt-text{flex:1;}
  .opt-text .name{font-size:11.5px; font-weight:600; color:var(--ink);}
  .opt-text .desc{font-size:9.5px; color:#7285A0; margin-top:1px; line-height:1.3;}
  .opt-price{font-size:12px; font-weight:700; color:var(--navy); white-space:nowrap; margin-top:1px;}
  .opt-price .strike-mini{font-size:10px; font-weight:600; color:#9AA7BB; text-decoration:line-through; margin-right:4px;}
  .opt-price .price-final{color:var(--alert);}
  .plano-card .price .strike-mini{font-size:10px; font-weight:600; color:#9AA7BB; text-decoration:line-through; margin-right:4px;}
  .plano-card .price .price-final{color:var(--alert);}

  .discount-note-red{
    display:none; font-size:10px; line-height:1.4; color:var(--alert); background:var(--alert-bg);
    border:1px solid #E7BEBE; border-radius:8px; padding:7px 10px; margin-top:6px; font-weight:700; text-align:center;
  }
  .discount-note-red.show{display:block;}

  .plan-warn{
    display:none; font-size:9.5px; line-height:1.4; color:var(--alert); background:var(--alert-bg);
    border:1px solid #E7BEBE; border-radius:8px; padding:8px 10px; margin-top:10px; font-weight:600;
  }
  .plan-warn.show{display:block;}

  .confirm-risk{
    display:none; align-items:flex-start; gap:8px; margin-top:7px; padding:9px 10px;
    border:1.5px solid #E7BEBE; background:var(--alert-bg); border-radius:10px; cursor:pointer;
    transition:border-color .2s, background .2s;
  }
  .confirm-risk.show{display:flex;}
  .confirm-risk input{width:18px; height:18px; margin-top:1px; accent-color:var(--alert); flex-shrink:0;}
  .confirm-risk .txt{font-size:9.5px; line-height:1.4; color:var(--alert); font-weight:600;}
  .confirm-risk.checked{border-color:#3FA35E; background:#EAF7EE;}
  .confirm-risk.checked .txt{color:#2C7A43;}

  .total-row{display:flex; justify-content:space-between; align-items:center; margin-top:11px; padding-top:11px; border-top:1.5px dashed var(--line);}
  .total-row .label{font-size:11px; color:#5A6B85; font-weight:600;}
  .total-row .value{font-family:'Playfair Display', serif; font-size:23px; font-weight:800; color:var(--navy);}
  .bundle-note{margin-top:8px; font-size:9.5px; color:var(--gold); background:#FBF6E7; border:1px solid var(--gold-light); padding:6px 10px; border-radius:8px; display:none; text-align:center; font-weight:600;}
  .bundle-note.show{display:block;}

  /* menu de componente curricular — só aparece para Educação Básica */
  .subject-box{background:var(--white); border:1px solid var(--line); border-radius:14px; padding:0; margin-bottom:0; max-height:0; opacity:0; overflow:hidden; transition:max-height .3s ease, opacity .25s ease, padding .3s ease, margin .3s ease;}
  .subject-box.show{padding:13px 14px; margin-bottom:14px; max-height:220px; opacity:1;}
  .subject-box label.slabel{display:block; font-size:11.5px; font-weight:700; color:var(--navy); margin-bottom:7px; font-family:'Playfair Display', serif;}
  select.subject-select{
    width:100%; font-size:12px; font-family:'Source Sans 3', sans-serif; color:var(--ink);
    padding:10px 11px; border-radius:9px; border:1px solid var(--line); background:var(--bg);
    appearance:none; -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%231B3A6B'/></svg>");
    background-repeat:no-repeat; background-position:right 12px center;
  }
  .outro-input{
    display:none; width:100%; margin-top:8px; font-size:12px; font-family:'Source Sans 3', sans-serif;
    padding:9px 11px; border-radius:9px; border:1px solid var(--line); background:var(--bg); color:var(--ink);
  }
  .outro-input.show{display:block;}

  .cta{
    display:flex; align-items:center; justify-content:center; gap:9px; width:100%;
    text-align:center; background:linear-gradient(135deg, #25D366, #1DAE54); color:var(--white);
    font-weight:700; font-size:14.5px; padding:14px; border-radius:14px; border:none;
    text-decoration:none; box-shadow:0 8px 18px rgba(37,211,102,.35); margin-bottom:8px;
    transition:opacity .2s;
  }
  .cta-icon{flex-shrink:0;}
  .cta:not(.disabled){animation: ctaPulse 1.8s ease-in-out infinite;}
  @keyframes ctaPulse{
    0%,100%{box-shadow:0 8px 18px rgba(37,211,102,.35); transform:scale(1);}
    50%{box-shadow:0 10px 28px rgba(37,211,102,.65); transform:scale(1.015);}
  }
  .cta.disabled{opacity:.4; pointer-events:none; box-shadow:none; animation:none;}
  .cta-hint{display:none; text-align:center; font-size:9.5px; color:var(--alert); font-weight:600; margin-bottom:8px;}
  .cta-hint.show{display:block;}
  .cta-sub{text-align:center; font-size:9.5px; color:#7285A0; margin-bottom:16px;}

  .trust{display:flex; gap:10px; margin-bottom:16px;}
  .trust-item{flex:1; background:var(--bg); border-radius:10px; padding:9px 8px; text-align:center;}
  .trust-item .n{font-family:'Playfair Display', serif; font-weight:800; font-size:14px; color:var(--navy);}
  .trust-item .t{font-size:8.5px; color:#5A6B85; text-transform:uppercase; letter-spacing:.04em; margin-top:2px;}

  .edital-link-wrap{display:flex; flex-direction:column; align-items:center; gap:2px; margin-bottom:16px;}
  .edital-hand{font-size:17px; animation:handDown 1.3s ease-in-out infinite;}
  @keyframes handDown{0%,100%{transform:translateY(0);} 50%{transform:translateY(4px);}}
  .edital-link{
    display:block; text-align:center; font-size:11.5px; font-weight:700; color:var(--navy);
    background:var(--bg); border:1.5px solid var(--navy); border-radius:10px;
    padding:9px 14px; text-decoration:none;
  }

  footer{background:var(--navy-deep); color:#B9C4D6; padding:15px 20px 22px; text-align:center; margin:0 -20px;}
  footer .name{font-family:'Playfair Display', serif; color:var(--white); font-size:12.5px; font-weight:700; margin-bottom:3px;}
  footer .disc{font-size:8.5px; line-height:1.5; color:#8CA0BF; margin-top:7px; max-width:34ch; margin-left:auto; margin-right:auto;}
</style>
</head>
<body>

<div class="stage">
  <div class="canvas">

    <!-- CABEÇALHO FIXO: pontuação e total sempre visíveis -->
    <div class="hero">
      <div class="celebrate-flash" id="celebrateFlash"></div>
      <span class="eyebrow"><span class="dot"></span>PSS SEED-PR 2027 · Prova Prática</span>
      <div class="store-badge">
        <span class="temple">🏛️</span>
        <span class="store-text">Loja de<br>Matemática</span>
      </div>
      <a href="https://drive.google.com/drive/folders/1JiluMEpoN3UkmdLGysfMUL4ozdAecTm4" target="_blank" rel="noopener" class="drive-link">
        <span class="dri
